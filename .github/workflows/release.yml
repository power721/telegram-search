name: release tg-search

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  IMAGE_REPOSITORY: tg-search

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Test backend
        run: go test ./...

      - name: Test frontend
        run: |
          npm run web:typecheck
          npm run web:test

      - name: Resolve release tag
        id: release-tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"
          echo "Docker version tag: ${version}"

      - name: Build frontend
        run: |
          npm run web:build
          rm -rf internal/web/dist
          mkdir -p internal/web
          cp -R web/dist internal/web/dist

      - name: Build Linux release assets
        env:
          VERSION: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/linux/amd64 dist/linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X 'tg-search/internal/build.Version=${VERSION}'" -o dist/linux/amd64/tg-search ./cmd/tg-search
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X 'tg-search/internal/build.Version=${VERSION}'" -o dist/linux/arm64/tg-search ./cmd/tg-search
          cp dist/linux/amd64/tg-search dist/tg-search-linux-amd64
          cp dist/linux/arm64/tg-search dist/tg-search-linux-arm64
          cd dist
          sha256sum tg-search-linux-amd64 tg-search-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-search-linux-amd64
          path: dist/tg-search-linux-amd64
          if-no-files-found: error

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-search-linux-arm64
          path: dist/tg-search-linux-arm64
          if-no-files-found: error

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.release-tag.outputs.version }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          fail_on_unmatched_files: true
          body_path: RELEASE_NOTES.md
          files: |
            dist/tg-search-linux-amd64
            dist/tg-search-linux-arm64
            dist/checksums.txt

      - name: Read release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BODY="$(gh release view "$GITHUB_REF_NAME" --json body --jq .body || true)"
          {
            echo "body<<EOF"
            printf '%s\n' "$RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: send telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.CHANNEL_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            tg-search 发布新版本
            版本: ${{ github.ref_name }}
            仓库: ${{ github.repository }}
            发布人: ${{ github.actor }}
            Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

            更新内容:
            ${{ steps.release_notes.outputs.body }}
